name: Deploy — PT Platform

on:
  push:
    branches:
      - main      # → production
      - staging   # → preview
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options: [preview, production]

concurrency:
  group: deploy-pt-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy PT to Vercel
    runs-on: ubuntu-latest
    env:
      # VERCEL_PROJECT_ID is the env var name required by Vercel CLI.
      # Its value is sourced from the GitHub secret VERCEL_PROJECT_ID_PT.
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_PT }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (production)
        if: github.ref_name == 'main'
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel (preview)
        if: github.ref_name != 'main'
        run: vercel deploy --token=${{ secrets.VERCEL_TOKEN }}
